{% extends 'base.html' %}
{% block content %}
<div class="form-wrap card">
  <h1>Forgot Password - {{ role|title }}</h1>
  <form method="post" class="form-grid">
    <label>Username or Email<input type="text" name="identifier" required></label>
    <button class="btn" type="submit">Generate Demo Reset Link</button>
  </form>
  {% if demo_link %}
    <div class="alert alert-info">Demo reset link: <a href="{{ demo_link }}">{{ demo_link }}</a></div>
  {% endif %}
</div>
{% endblock %}
